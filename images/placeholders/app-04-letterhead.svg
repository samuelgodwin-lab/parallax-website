      <path d="M9 31 L9 9 L18 22 L27 9 L27 31" fill="#0A1E3F"/>
    </g>
    <text x="86" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0A1E3F" letter-spacing="-0.5">MARK<tspan fill="#1A73E8">.</tspan></text>
    <!-- Address top-right -->
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8" fill="#0A1E3F" opacity="0.55" text-anchor="end">

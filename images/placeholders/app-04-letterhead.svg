      <rect x="40" y="218" width="60" height="6"/>
    </g>
    <g fill="#0A1E3F" opacity="0.18">
      <rect x="40" y="260" width="380" height="3"/>
      <rect x="40" y="272" width="370" height="3"/>
      <rect x="40" y="284" width="340" height="3"/>
      <rect x="40" y="296" width="380" height="3"/>
      <rect x="40" y="308" width="220" height="3"/>
      <rect x="40" y="332" width="380" height="3"/>
      <rect x="40" y="344" width="350" height="3"/>
      <rect x="40" y="356" width="280" height="3"/>
      <rect x="40" y="380" width="380" height="3"/>
      <rect x="40" y="392" width="300" height="3"/>
    </g>

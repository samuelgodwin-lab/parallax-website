<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="750" fill="#E6E6E1"/>
  <!-- Paper sheet (slight rotation) -->
  <g transform="translate(70 60) rotate(-2)">
    <rect x="0" y="0" width="460" height="640" fill="#F8F8F4" stroke="#0A1E3F" stroke-width="0.5" stroke-opacity="0.12"/>
    <rect x="-2" y="638" width="464" height="6" fill="#0A1E3F" fill-opacity="0.1"/>

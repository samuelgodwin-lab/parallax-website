<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" preserveAspectRatio="xMidYMid slice">
  <rect width="900" height="650" fill="#E6E6E1"/>
  <!-- Subtle desk grain -->
  <g opacity="0.04" fill="#0A1E3F">
    <rect x="0" y="0" width="900" height="650"/>
  </g>
  <!-- Card 1 (rotated) -->
  <g transform="translate(180 240) rotate(-8)">
    <rect x="0" y="0" width="320" height="200" fill="#F5F5F2" stroke="#0A1E3F" stroke-width="1" stroke-opacity="0.1"/>
    <rect x="-2" y="200" width="320" height="6" fill="#0A1E3F" fill-opacity="0.12"/>
    <g transform="translate(28 32)">
      <rect x="0" y="0" width="32" height="32" fill="none" stroke="#0A1E3F" stroke-width="3"/>
      <path d="M8 28 L8 8 L16 20 L24 8 L24 28" fill="#0A1E3F"/>
    </g>
    <text x="76" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0A1E3F" letter-spacing="-0.5">MARK<tspan fill="#1A73E8">.</tspan></text>
    <line x1="28" y1="120" x2="160" y2="120" stroke="#0A1E3F" stroke-width="1"/>
    <text x="28" y="148" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="1" fill="#0A1E3F" opacity="0.7">JANE COOPER</text>
    <text x="28" y="164" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8" letter-spacing="1" fill="#0A1E3F" opacity="0.5">DESIGN DIRECTOR</text>
    <text x="28" y="184" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8" letter-spacing="1" fill="#1A73E8" opacity="0.8">JANE@MARK.STUDIO</text>
  </g>
  <!-- Card 2 (rotated other way, behind) -->
  <g transform="translate(440 280) rotate(6)">
    <rect x="0" y="0" width="320" height="200" fill="#0A1E3F"/>
    <rect x="-2" y="200" width="320" height="6" fill="#000" fill-opacity="0.18"/>
    <g transform="translate(140 84)">
      <rect x="0" y="0" width="40" height="40" fill="none" stroke="#F5F5F2" stroke-width="3"/>
      <path d="M10 34 L10 10 L20 24 L30 10 L30 34" fill="#F5F5F2"/>
    </g>
  </g>
  <text x="40" y="44" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#0A1E3F" opacity="0.45">02 — STATIONERY</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="r1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F3D2C"/>
      <stop offset="1" stop-color="#0E2419"/>
    </linearGradient>
  </defs>
  <rect width="600" height="240" fill="url(#r1)"/>
  <!-- Wind turbine silhouettes -->
  <g fill="#F5F5F2" opacity="0.95">
    <!-- Tower 1 -->
    <rect x="148" y="80" width="6" height="120"/>
    <g transform="translate(151 80)">
      <circle r="6" fill="#F5F5F2"/>
      <path d="M0 0 L0 -50 L6 -56 L0 -8 Z" fill="#F5F5F2"/>
      <path d="M0 0 L44 22 L52 14 L8 6 Z" fill="#F5F5F2"/>
      <path d="M0 0 L-44 28 L-50 22 L-8 6 Z" fill="#F5F5F2"/>
    </g>
    <!-- Tower 2 -->
    <g opacity="0.7">
      <rect x="298" y="100" width="5" height="100"/>
      <g transform="translate(300 100)">
        <circle r="5"/>
        <path d="M0 0 L0 -42 L5 -48 L0 -6 Z"/>
        <path d="M0 0 L36 18 L42 12 L6 4 Z"/>
        <path d="M0 0 L-36 24 L-42 18 L-6 4 Z"/>
      </g>
    </g>
    <!-- Tower 3 -->
    <g opacity="0.5">
      <rect x="438" y="116" width="4" height="84"/>
      <g transform="translate(440 116)">
        <circle r="4"/>
        <path d="M0 0 L0 -34 L4 -38 L0 -4 Z"/>
        <path d="M0 0 L30 14 L34 10 L4 2 Z"/>
        <path d="M0 0 L-30 20 L-34 16 L-4 2 Z"/>
      </g>
    </g>
  </g>
  <!-- Horizon -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#F5F5F2" stroke-opacity="0.12"/>
  <text x="24" y="36" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#F5F5F2" opacity="0.55">VESTAS — WIND ENERGY</text>
</svg>

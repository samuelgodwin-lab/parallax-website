    <text y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="-3" fill="#F5F5F2">Build it. Drive it.</text>
    <text y="160" font-family="ui-sans-serif, system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="-3" fill="#1A73E8">Own it.</text>
    <g transform="translate(0 220)">

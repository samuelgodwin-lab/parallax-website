<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="700" fill="#F5F5F2"/>
  <!-- Top site nav -->
  <rect x="0" y="0" width="1600" height="56" fill="#FFFFFF"/>
  <rect x="0" y="56" width="1600" height="1" fill="#0A1E3F" fill-opacity="0.08"/>
  <g transform="translate(48 16)">

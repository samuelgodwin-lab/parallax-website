    <text x="260" font-size="22" font-weight="700" fill="#0A1E3F" opacity="0.55" letter-spacing="-0.5">SUV / Hybrid</text>
    <text x="480" font-size="22" font-weight="700" fill="#0A1E3F" opacity="0.55" letter-spacing="-0.5">Coupé / Edition</text>
    <text x="720" font-size="22" font-weight="700" fill="#0A1E3F" opacity="0.55" letter-spacing="-0.5">Wagon / Touring</text>
  </g>
  <text x="1520" y="654" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#1A73E8">VIEW ALL →</text>

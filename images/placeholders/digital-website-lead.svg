  <!-- Hero -->
  <rect x="0" y="56" width="1600" height="500" fill="#0A1E3F"/>
  <g stroke="#1A73E8" stroke-width="1" opacity="0.12" fill="none">
    <path d="M0 156 H1600 M0 256 H1600 M0 356 H1600 M0 456 H1600"/>
    <path d="M200 56 V556 M400 56 V556 M600 56 V556 M800 56 V556 M1000 56 V556 M1200 56 V556 M1400 56 V556"/>
  </g>
  <g transform="translate(80 180)">

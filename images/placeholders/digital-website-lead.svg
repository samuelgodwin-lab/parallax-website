    <path d="M5 16 L5 5 L10 12 L15 5 L15 16" fill="#0A1E3F"/>
    <text x="32" y="16" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0A1E3F" letter-spacing="-0.4">MARK<tspan fill="#1A73E8">.</tspan></text>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="1.5" fill="#0A1E3F" opacity="0.55" transform="translate(680 32)">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="r3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A3D38"/>
      <stop offset="1" stop-color="#0A2420"/>
    </linearGradient>
  </defs>
  <rect width="600" height="240" fill="url(#r3)"/>
  <!-- Architecture / system diagram -->
  <g stroke="#F5F5F2" stroke-width="1" opacity="0.7" fill="none">
    <!-- Center node -->
    <circle cx="300" cy="120" r="32"/>
    <!-- Outer nodes -->
    <circle cx="120" cy="80"  r="18"/>
    <circle cx="120" cy="180" r="18"/>
    <circle cx="480" cy="80"  r="18"/>
    <circle cx="480" cy="180" r="18"/>
    <circle cx="300" cy="40"  r="14"/>
    <circle cx="300" cy="200" r="14"/>
    <!-- Connections -->
    <line x1="138" y1="80"  x2="268" y2="120"/>
    <line x1="138" y1="180" x2="268" y2="120"/>
    <line x1="462" y1="80"  x2="332" y2="120"/>
    <line x1="462" y1="180" x2="332" y2="120"/>
    <line x1="300" y1="54"  x2="300" y2="88"/>
    <line x1="300" y1="186" x2="300" y2="152"/>
  </g>
  <!-- Center fill -->
  <circle cx="300" cy="120" r="14" fill="#7DD3C0"/>
  <!-- Outer node fills -->
  <g fill="#7DD3C0" opacity="0.55">
    <circle cx="120" cy="80"  r="6"/>
    <circle cx="120" cy="180" r="6"/>
    <circle cx="480" cy="80"  r="6"/>
    <circle cx="480" cy="180" r="6"/>
  </g>
  <text x="24" y="36" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#F5F5F2" opacity="0.55">SOPRA STERIA — ENTERPRISE</text>
</svg>

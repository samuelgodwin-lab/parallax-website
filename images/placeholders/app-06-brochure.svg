<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="750" fill="#2A3A5A"/>
  <!-- Open spread -->
  <g transform="translate(60 140)">
    <!-- Left page -->
    <g>
      <rect x="0" y="0" width="240" height="470" fill="#F5F5F2"/>
      <!-- Image block -->
      <rect x="20" y="20" width="200" height="180" fill="#0A1E3F"/>
      <g transform="translate(96 92)">
        <rect x="0" y="0" width="48" height="48" fill="none" stroke="#F5F5F2" stroke-width="3"/>
        <path d="M12 41 L12 12 L24 30 L36 12 L36 41" fill="#F5F5F2"/>
      </g>
      <!-- Heading -->
      <text x="20" y="244" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0A1E3F" letter-spacing="-0.5">Built for the road ahead.</text>
      <!-- Body lines -->
      <g fill="#0A1E3F" opacity="0.4">
        <rect x="20" y="280" width="200" height="3"/>
        <rect x="20" y="290" width="190" height="3"/>
        <rect x="20" y="300" width="180" height="3"/>
        <rect x="20" y="310" width="200" height="3"/>
        <rect x="20" y="320" width="160" height="3"/>
      </g>
      <!-- Footer -->
      <text x="20" y="450" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8" letter-spacing="1.5" fill="#1A73E8" opacity="0.7">— 03</text>
    </g>
    <!-- Right page -->
    <g transform="translate(240 0)">
      <rect x="0" y="0" width="240" height="470" fill="#F8F8F4"/>
      <!-- Spine shadow -->
      <rect x="0" y="0" width="6" height="470" fill="#0A1E3F" fill-opacity="0.18"/>
      <!-- Big quote / pull -->
      <text x="20" y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="800" fill="#0A1E3F" letter-spacing="-1.5">"</text>
      <text x="20" y="140" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#0A1E3F" letter-spacing="-0.3">Every surface a chance to reinforce the mark.</text>
      <!-- Body -->
      <g fill="#0A1E3F" opacity="0.4">
        <rect x="20" y="200" width="200" height="3"/>
        <rect x="20" y="210" width="200" height="3"/>
        <rect x="20" y="220" width="190" height="3"/>
        <rect x="20" y="230" width="180" height="3"/>
        <rect x="20" y="240" width="200" height="3"/>
        <rect x="20" y="250" width="170" height="3"/>
      </g>
      <!-- Page number -->
      <text x="220" y="450" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8" letter-spacing="1.5" fill="#1A73E8" opacity="0.7">04 —</text>
    </g>
    <!-- Bottom shadow -->
    <rect x="-2" y="470" width="484" height="6" fill="#000" fill-opacity="0.3"/>
  </g>
  <text x="36" y="44" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#F5F5F2" opacity="0.45">06 — BROCHURE</text>
</svg>

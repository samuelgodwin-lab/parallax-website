<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15243D"/>
      <stop offset="1" stop-color="#0A1E3F"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1E3F"/>
      <stop offset="1" stop-color="#050D1F"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#sky)"/>
  <!-- Road -->
  <rect x="0" y="440" width="900" height="160" fill="url(#road)"/>
  <!-- Road dashes -->
  <g fill="#1A73E8" opacity="0.35">
    <rect x="40"  y="510" width="60" height="4"/>
    <rect x="160" y="510" width="60" height="4"/>
    <rect x="280" y="510" width="60" height="4"/>
    <rect x="400" y="510" width="60" height="4"/>
    <rect x="520" y="510" width="60" height="4"/>
    <rect x="640" y="510" width="60" height="4"/>
    <rect x="760" y="510" width="60" height="4"/>
  </g>
  <!-- Vehicle silhouette (side profile) -->
  <g transform="translate(180 280)">
    <!-- Body -->
    <path d="M0 100 L40 60 L130 40 L260 30 L380 30 L450 60 L530 60 L560 100 L560 130 L500 140 L60 140 L0 130 Z" fill="#F5F5F2"/>
    <!-- Window strip -->
    <path d="M80 60 L150 42 L260 36 L380 36 L430 60 Z" fill="#0A1E3F" opacity="0.85"/>
    <!-- Door divider -->
    <line x1="240" y1="60" x2="240" y2="138" stroke="#0A1E3F" stroke-width="1" opacity="0.3"/>
    <line x1="320" y1="60" x2="320" y2="138" stroke="#0A1E3F" stroke-width="1" opacity="0.3"/>
    <!-- Mark on door -->
    <g transform="translate(258 88)">
      <rect x="0" y="0" width="44" height="44" fill="none" stroke="#0A1E3F" stroke-width="3"/>
      <path d="M11 38 L11 11 L22 27 L33 11 L33 38" fill="#0A1E3F"/>
    </g>
    <!-- Wheels -->
    <circle cx="120" cy="148" r="36" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="3"/>
    <circle cx="120" cy="148" r="14" fill="#1A1A1A"/>
    <circle cx="450" cy="148" r="36" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="3"/>
    <circle cx="450" cy="148" r="14" fill="#1A1A1A"/>
    <!-- Headlight glow -->
    <ellipse cx="568" cy="100" rx="40" ry="10" fill="#1A73E8" opacity="0.4"/>
  </g>
  <text x="36" y="44" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#F5F5F2" opacity="0.45">07 — LIVERY</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="hg1" cx="50%" cy="55%" r="60%">
      <stop offset="0" stop-color="#15315E"/>
      <stop offset="0.6" stop-color="#0A1E3F"/>
      <stop offset="1" stop-color="#040A1A"/>
    </radialGradient>
    <linearGradient id="hg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1E3F" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A1E3F" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#hg1)"/>
  <!-- Atmospheric grid -->
  <g stroke="#1A73E8" stroke-width="1" opacity="0.08" fill="none">
    <path d="M0 200 H1920 M0 400 H1920 M0 600 H1920 M0 800 H1920"/>
    <path d="M240 0 V1080 M480 0 V1080 M720 0 V1080 M960 0 V1080 M1200 0 V1080 M1440 0 V1080 M1680 0 V1080"/>
  </g>
  <!-- Light beams -->
  <g opacity="0.15">
    <polygon points="800,0 880,0 1000,1080 920,1080" fill="#1A73E8"/>
    <polygon points="1200,0 1280,0 1100,1080 1020,1080" fill="#1A73E8"/>
  </g>
  <!-- Vehicle silhouette in mid-distance -->
  <g transform="translate(640 540)" opacity="0.95">
    <ellipse cx="320" cy="280" rx="380" ry="22" fill="#000" opacity="0.6"/>
    <path d="M0 220 L60 150 L180 110 L420 100 L520 110 L600 150 L640 200 L620 260 L20 260 Z" fill="#0A1E3F" stroke="#F5F5F2" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M120 150 L200 116 L380 110 L460 130 Z" fill="#15315E"/>
    <!-- Windshield gleam -->
    <path d="M140 150 L180 130 L240 124 L260 134 Z" fill="#F5F5F2" opacity="0.18"/>
    <circle cx="120" cy="260" r="50" fill="#0A0A0A"/>
    <circle cx="120" cy="260" r="22" fill="#15315E"/>
    <circle cx="500" cy="260" r="50" fill="#0A0A0A"/>
    <circle cx="500" cy="260" r="22" fill="#15315E"/>
    <!-- Headlight beams -->
    <ellipse cx="640" cy="220" rx="80" ry="14" fill="#1A73E8" opacity="0.55"/>
    <ellipse cx="640" cy="220" rx="160" ry="6" fill="#1A73E8" opacity="0.3"/>
  </g>
  <!-- Bottom scrim for nav contrast -->
  <rect x="0" y="540" width="1920" height="540" fill="url(#hg2)"/>
  <!-- Tiny corner labels -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" fill="#F5F5F2">
    <text x="60" y="60" font-size="11" letter-spacing="2" opacity="0.45">— PROJECT HERO</text>
    <text x="1860" y="60" text-anchor="end" font-size="11" letter-spacing="2" opacity="0.45">2026 / 03</text>
  </g>
</svg>

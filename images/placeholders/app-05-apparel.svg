  <text x="36" y="44" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#F5F5F2" opacity="0.4">05 — APPAREL</text>
  <text x="564" y="724" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="2" fill="#C99A2E" opacity="0.55">EMBROIDERED · BRASS</text>

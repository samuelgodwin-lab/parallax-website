<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="900" fill="#F5F5F2"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="900" fill="#0A1E3F"/>
  <g transform="translate(28 32)">
    <rect x="0" y="0" width="22" height="22" fill="none" stroke="#F5F5F2" stroke-width="2.5"/>
    <path d="M5 18 L5 5 L11 13 L17 5 L17 18" fill="#F5F5F2"/>
    <text x="34" y="18" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#F5F5F2" letter-spacing="-0.4">DEALER<tspan fill="#1A73E8">.</tspan></text>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" transform="translate(28 120)" fill="#F5F5F2">
    <text y="0" fill="#1A73E8">— DASHBOARD</text>
    <text y="40" opacity="0.55">INVENTORY</text>
    <text y="76" opacity="0.55">CUSTOMERS</text>
    <text y="112" opacity="0.55">ORDERS</text>
    <text y="148" opacity="0.55">REPORTS</text>
    <text y="184" opacity="0.55">SETTINGS</text>
  </g>
  <rect x="20" y="100" width="3" height="20" fill="#1A73E8"/>
  <!-- Main header -->
  <g transform="translate(280 36)">
    <text font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#0A1E3F" opacity="0.55">— DASHBOARD</text>
    <text y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="800" fill="#0A1E3F" letter-spacing="-1.2">Today's pipeline</text>
  </g>
  <!-- KPI cards -->
  <g transform="translate(280 140)">
    <g>
      <rect x="0" y="0" width="280" height="140" fill="#FFFFFF" stroke="#0A1E3F" stroke-opacity="0.08"/>
      <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="2" fill="#0A1E3F" opacity="0.5">CONFIGS / DAY</text>
      <text x="20" y="84" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0A1E3F" letter-spacing="-1.5">142</text>
      <text x="20" y="116" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#1A73E8">↑ 12.4%</text>
    </g>
    <g transform="translate(300 0)">
      <rect x="0" y="0" width="280" height="140" fill="#FFFFFF" stroke="#0A1E3F" stroke-opacity="0.08"/>
      <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="2" fill="#0A1E3F" opacity="0.5">TEST DRIVES</text>
      <text x="20" y="84" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0A1E3F" letter-spacing="-1.5">28</text>
      <text x="20" y="116" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#1A73E8">↑ 4.0%</text>
    </g>
    <g transform="translate(600 0)">
      <rect x="0" y="0" width="280" height="140" fill="#0A1E3F"/>
      <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="2" fill="#1A73E8">ORDERS PLACED</text>
      <text x="20" y="84" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800" fill="#F5F5F2" letter-spacing="-1.5">9</text>
      <text x="20" y="116" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#C99A2E">£642k</text>
    </g>
  </g>
  <!-- Chart -->
  <g transform="translate(280 320)">
    <rect x="0" y="0" width="880" height="280" fill="#FFFFFF" stroke="#0A1E3F" stroke-opacity="0.08"/>
    <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#0A1E3F" opacity="0.5">CONFIGURATOR ACTIVITY · 14 DAYS</text>

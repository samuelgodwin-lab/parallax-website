    <g transform="translate(20 80)" fill="#1A73E8">
      <rect x="0"   y="80" width="40" height="120" opacity="0.7"/>
      <rect x="60"  y="60" width="40" height="140" opacity="0.7"/>
      <rect x="120" y="100" width="40" height="100" opacity="0.7"/>
      <rect x="180" y="40" width="40" height="160" opacity="0.85"/>
      <rect x="240" y="20" width="40" height="180" fill="#0A1E3F"/>
      <rect x="300" y="50" width="40" height="150" opacity="0.85"/>
      <rect x="360" y="30" width="40" height="170" opacity="0.85"/>
      <rect x="420" y="10" width="40" height="190" fill="#0A1E3F"/>
      <rect x="480" y="40" width="40" height="160" opacity="0.85"/>
      <rect x="540" y="60" width="40" height="140" opacity="0.7"/>
      <rect x="600" y="20" width="40" height="180" fill="#0A1E3F"/>
      <rect x="660" y="0"  width="40" height="200" fill="#1A73E8"/>
      <rect x="720" y="30" width="40" height="170" opacity="0.85"/>
      <rect x="780" y="50" width="40" height="150" opacity="0.7"/>
    </g>
    <line x1="20" y1="260" x2="860" y2="260" stroke="#0A1E3F" stroke-opacity="0.1"/>
  </g>
  <!-- Activity feed -->
  <g transform="translate(280 640)">
    <text font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#0A1E3F" opacity="0.5">RECENT ACTIVITY</text>
    <g transform="translate(0 16)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#0A1E3F">
      <text y="22">Order #4821 — M Sport Sedan, Navy</text>
      <text x="860" y="22" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A73E8">2m</text>
      <line x1="0" y1="38" x2="880" y2="38" stroke="#0A1E3F" stroke-opacity="0.06"/>
      <text y="68">Test drive booked — SUV Hybrid, Black</text>
      <text x="860" y="68" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A73E8">14m</text>
      <line x1="0" y1="84" x2="880" y2="84" stroke="#0A1E3F" stroke-opacity="0.06"/>
      <text y="114">Quote sent — Coupé Edition</text>
      <text x="860" y="114" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A73E8">38m</text>
    </g>
  </g>
</svg>

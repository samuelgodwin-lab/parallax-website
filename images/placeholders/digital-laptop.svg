<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="1000" fill="#F5F5F2"/>
  <!-- Top nav bar -->
  <rect x="0" y="0" width="1600" height="60" fill="#FFFFFF"/>
  <rect x="0" y="60" width="1600" height="1" fill="#0A1E3F" fill-opacity="0.08"/>
  <g transform="translate(48 18)">
    <rect x="0" y="0" width="22" height="22" fill="none" stroke="#0A1E3F" stroke-width="2.5"/>
    <path d="M5 18 L5 5 L11 13 L17 5 L17 18" fill="#0A1E3F"/>
    <text x="34" y="18" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0A1E3F" letter-spacing="-0.4">MARK<tspan fill="#1A73E8">.</tspan></text>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#0A1E3F" opacity="0.55" transform="translate(660 36)">
    <text x="0">CONFIGURE</text>
    <text x="100">MODELS</text>
    <text x="180">DEALERS</text>
    <text x="260">SUPPORT</text>
  </g>
  <rect x="1480" y="16" width="80" height="28" fill="#0A1E3F"/>
  <text x="1520" y="35" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="1.5" fill="#F5F5F2">SIGN IN</text>
  <!-- Hero section -->
  <rect x="0" y="60" width="1600" height="500" fill="#0A1E3F"/>
  <!-- Hero pattern -->
  <g stroke="#1A73E8" stroke-width="1" opacity="0.15" fill="none">
    <path d="M0 160 H1600 M0 260 H1600 M0 360 H1600 M0 460 H1600"/>
    <path d="M200 60 V560 M400 60 V560 M600 60 V560 M800 60 V560 M1000 60 V560 M1200 60 V560 M1400 60 V560"/>
  </g>
  <!-- Hero copy -->
  <g transform="translate(80 200)">
    <text font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="3" fill="#1A73E8" opacity="0.85">— FLAGSHIP CONFIGURATOR</text>
    <text y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="800" letter-spacing="-3" fill="#F5F5F2">Build it. Drive it.</text>
    <text y="160" font-family="ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="800" letter-spacing="-3" fill="#1A73E8">Own it.</text>
    <g transform="translate(0 220)">
      <rect x="0" y="0" width="180" height="48" fill="#F5F5F2"/>
      <text x="90" y="30" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#0A1E3F">CONFIGURE →</text>
      <rect x="200" y="0" width="180" height="48" fill="none" stroke="#F5F5F2" stroke-width="1.5"/>
      <text x="290" y="30" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#F5F5F2">EXPLORE</text>
    </g>
  </g>
  <!-- Hero product silhouette right side -->
  <g transform="translate(900 240)" opacity="0.85">
    <ellipse cx="320" cy="240" rx="320" ry="14" fill="#000" opacity="0.4"/>
    <path d="M0 200 L60 140 L180 110 L420 100 L520 110 L580 140 L620 180 L600 220 L20 220 Z" fill="#F5F5F2"/>
    <path d="M120 140 L200 116 L380 110 L460 130 Z" fill="#0A1E3F"/>
    <circle cx="120" cy="220" r="42" fill="#0A0A0A"/>
    <circle cx="120" cy="220" r="18" fill="#1A73E8"/>
    <circle cx="500" cy="220" r="42" fill="#0A0A0A"/>
    <circle cx="500" cy="220" r="18" fill="#1A73E8"/>
  </g>
  <!-- Card row beneath hero -->
  <g transform="translate(80 600)">
    <g>
      <rect x="0" y="0" width="460" height="320" fill="#FFFFFF" stroke="#0A1E3F" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="460" height="180" fill="#EAEAE3"/>
      <text x="24" y="220" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#1A73E8">M SPORT</text>
      <text x="24" y="252" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0A1E3F" letter-spacing="-0.5">Sedan / 2025</text>
      <text x="24" y="284" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#0A1E3F" opacity="0.55">FROM £52,400</text>
    </g>
    <g transform="translate(490 0)">
      <rect x="0" y="0" width="460" height="320" fill="#FFFFFF" stroke="#0A1E3F" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="460" height="180" fill="#0A1E3F"/>
      <text x="24" y="220" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#1A73E8">HYBRID</text>
      <text x="24" y="252" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0A1E3F" letter-spacing="-0.5">SUV / 2025</text>
      <text x="24" y="284" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#0A1E3F" opacity="0.55">FROM £64,800</text>
    </g>
    <g transform="translate(980 0)">
      <rect x="0" y="0" width="460" height="320" fill="#FFFFFF" stroke="#0A1E3F" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="460" height="180" fill="#1A1A1A"/>
      <text x="24" y="220" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#C99A2E">EDITION</text>
      <text x="24" y="252" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0A1E3F" letter-spacing="-0.5">Coupé / 2025</text>
      <text x="24" y="284" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5" fill="#0A1E3F" opacity="0.55">FROM £88,200</text>
    </g>
  </g>
</svg>

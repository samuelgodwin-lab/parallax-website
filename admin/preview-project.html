<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Preview — Parallax Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── Preview Bar ── */
    .preview-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 9999;
      background: oklch(0.10 0.003 249);
      border-bottom: 1px solid oklch(1 0 0 / 0.08);
      padding: 20px 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .preview-bar__inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 clamp(24px, 5vw, 80px);
      display: flex; align-items: center; gap: 16px;
    }
    .preview-bar__badge {
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: oklch(0.60 0.18 249); border: 1px solid oklch(0.60 0.18 249 / 0.4);
      padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
    }
    .preview-bar__title {
      font-size: 12px; color: oklch(1 0 0 / 0.5); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 500;
    }
    .preview-bar__actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .preview-bar__btn {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; border: 1px solid oklch(1 0 0 / 0.2);
      color: oklch(1 0 0 / 0.6); background: transparent; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      transition: color 160ms, border-color 160ms;
    }
    .preview-bar__btn:hover { color: oklch(1 0 0 / 0.9); border-color: oklch(1 0 0 / 0.4); }
    .preview-bar__btn--publish { background: oklch(0.60 0.18 249); border-color: oklch(0.60 0.18 249); color: white; }
    .preview-bar__btn--publish:hover { background: oklch(0.65 0.18 249); color: white; }

    /* ── Project styles ── */
    :root {
      --bg:             oklch(1 0 0);
      --surface:        oklch(0.98 0.001 0);
      --text:           oklch(0 0 0);
      --text-2:         oklch(0.40 0.005 0);
      --text-3:         oklch(0.55 0.005 0);
      --accent:         oklch(0.60 0.18 249);
      --accent-muted:   oklch(0.60 0.18 249 / 0.14);
      --accent-soft:    oklch(0.60 0.18 249 / 0.06);
      --border:         oklch(0 0 0 / 0.15);
      --border-strong:  oklch(0 0 0 / 0.30);
      --font-d: 'Bricolage Grotesque', system-ui, sans-serif;
      --font-m: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --s1:4px; --s2:8px; --s3:12px; --s4:16px;
      --s6:24px; --s8:32px; --s12:48px; --s16:64px; --s24:96px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-d); line-height: 1.6;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
      padding-top: 88px;
    }
    .w { max-width: 1400px; margin: 0 auto; padding: 0 clamp(24px, 5vw, 80px); }

    .loading-screen {
      min-height: calc(100vh - 88px);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      color: var(--text-3); font-family: var(--font-m); font-size: 12px; letter-spacing: 0.1em;
    }
    .loading-spinner { width: 24px; height: 24px; border: 2px solid oklch(0 0 0 / 0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Shared utilities */
    .slabel {
      font-family: var(--font-m); font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 12px; margin-bottom: var(--s6);
    }
    .slabel::before { content: ''; width: 22px; height: 1px; background: var(--accent); flex-shrink: 0; }
    .sh { font-size: clamp(32px, 4vw, 58px); font-weight: 700; letter-spacing: -0.042em; line-height: 1.0; }
    .sh em { font-style: normal; color: var(--accent); }
    .sec__hdr { margin-bottom: var(--s12); }
    .sec__hdr .slabel { margin-bottom: var(--s4); }

    /* Nav */
    .preview-nav { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .preview-nav__inner { display: flex; align-items: center; justify-content: space-between; }
    .preview-nav__logo { font-size: 17px; font-weight: 800; letter-spacing: -0.045em; color: var(--text); text-decoration: none; }
    .preview-nav__logo span { color: var(--accent); }
    .preview-nav__note { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); }

    /* Hero */
    .proj-hero {
      position: relative; height: 100svh; min-height: 600px; overflow: hidden;
      background: oklch(0.06 0.003 249);
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .proj-hero__img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .proj-hero__scrim { position: absolute; inset: 0; background: linear-gradient(to bottom, oklch(0 0 0 / 0) 30%, oklch(0 0 0 / 0.75) 100%); z-index: 1; }
    .proj-hero__content { position: relative; z-index: 2; padding-bottom: clamp(48px, 6vw, 80px); }
    .proj-hero__tag {
      font-family: var(--font-m); font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: oklch(1 0 0 / 0.55);
      display: flex; align-items: center; gap: 12px; margin-bottom: var(--s6);
    }
    .proj-hero__tag::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
    .proj-hero__client { font-family: var(--font-m); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
    .proj-hero__h1 { font-size: clamp(40px, 6.5vw, 96px); font-weight: 800; letter-spacing: -0.052em; line-height: 0.92; color: white; margin-top: var(--s3); max-width: 900px; }

    /* Meta band */
    .proj-meta { border-bottom: 1px solid var(--border); background: var(--bg); }
    .proj-meta__grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    .proj-meta__item { padding: var(--s8) 0; border-right: 1px solid var(--border); padding-right: var(--s8); }
    .proj-meta__item:first-child { padding-left: 0; }
    .proj-meta__item:last-child { border-right: none; padding-right: 0; padding-left: var(--s8); }
    .proj-meta__item:not(:first-child):not(:last-child) { padding-left: var(--s8); }
    .proj-meta__label { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-3); margin-bottom: var(--s2); display: block; }
    .proj-meta__val { font-size: clamp(14px, 1.3vw, 16px); font-weight: 600; letter-spacing: -0.02em; color: var(--text); line-height: 1.3; }

    /* Overview */
    .proj-overview { padding: var(--s24) 0; background: #f8f8f8; }
    .proj-overview__inner { display: grid; grid-template-columns: 1fr 1.2fr; gap: clamp(var(--s16), 8vw, 160px); align-items: start; }
    .proj-overview__h { font-size: clamp(28px, 3.2vw, 48px); font-weight: 700; letter-spacing: -0.042em; line-height: 1.0; margin-top: var(--s6); }
    .proj-overview__h em { font-style: normal; color: var(--accent); }
    .proj-overview__body p { font-size: clamp(16px, 1.7vw, 19px); color: var(--text-2); line-height: 1.72; margin-bottom: var(--s6); }
    @media (max-width: 860px) { .proj-overview__inner { grid-template-columns: 1fr; gap: var(--s8); } }

    /* Challenge */
    .proj-challenge { padding: var(--s24) 0; background: #f8f8f8; border-top: 1px solid var(--border); }
    .proj-challenge__inner { max-width: 860px; }
    .proj-challenge__pull { font-size: clamp(22px, 2.8vw, 38px); font-weight: 700; letter-spacing: -0.038em; line-height: 1.2; color: var(--text); margin-top: var(--s6); margin-bottom: var(--s8); }
    .proj-challenge__pull em { font-style: normal; color: var(--accent); }
    .proj-challenge__body { font-size: clamp(15px, 1.4vw, 17px); color: var(--text-2); line-height: 1.8; max-width: 68ch; }

    /* Identity — Branding */
    .sec--branding { padding: var(--s24) 0; background: var(--bg); }
    .brand-primary {
      position: relative; aspect-ratio: 16/7;
      background: var(--surface); border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-primary::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(oklch(0 0 0 / 0.035) 1px, transparent 1px), linear-gradient(90deg, oklch(0 0 0 / 0.035) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .brand-primary img { max-width: 40%; max-height: 55%; object-fit: contain; position: relative; z-index: 1; }
    .brand-primary__caption {
      position: absolute; left: var(--s4); bottom: var(--s4); z-index: 3;
      font-family: var(--font-m); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: white; background: oklch(0 0 0 / 0.45); padding: 5px 9px;
    }
    .brand-primary__empty {
      font-family: var(--font-m); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: oklch(0 0 0 / 0.2);
    }
    .brand-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .brand-construction, .brand-variant {
      aspect-ratio: 5/4; background: var(--surface); border: 1px solid var(--border);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; padding: var(--s6);
    }
    .brand-construction img, .brand-variant img { max-width: 72%; max-height: 72%; object-fit: contain; }
    .brand-construction__caption, .brand-variant__label {
      position: absolute; left: var(--s3); bottom: var(--s3);
      font-family: var(--font-m); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: white; background: oklch(0 0 0 / 0.45); padding: 5px 9px;
    }
    .brand-variant--dark { background: oklch(0.08 0.003 249); border-color: oklch(0.08 0.003 249); }
    .brand-variant--accent { background: var(--accent); border-color: var(--accent); }
    .slot-empty {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      color: oklch(0 0 0 / 0.18);
    }
    @media (max-width: 900px) { .brand-row { grid-template-columns: repeat(2, 1fr); } }

    /* Brand System */
    .sec--system { padding: var(--s24) 0; background: #f8f8f8; }
    .bsys-palette { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--s6); }
    .bsys-swatch-item { display: flex; flex-direction: column; gap: 4px; }
    .bsys-swatch-chip { width: 72px; height: 56px; border: 1px solid var(--border); }
    .bsys-swatch-name { font-size: 11px; font-weight: 500; color: var(--text-2); }
    .bsys-swatch-hex { font-family: var(--font-m); font-size: 9px; color: var(--text-3); letter-spacing: 0.06em; }
    .bsys-font-row { display: flex; align-items: baseline; gap: var(--s6); padding: var(--s4) 0; border-bottom: 1px solid var(--border); }
    .bsys-font-role { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); min-width: 100px; }
    .bsys-font-sample { font-size: clamp(24px, 3vw, 42px); font-weight: 700; letter-spacing: -0.03em; }
    .bsys-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s8); }
    .bsys-card { background: var(--bg); border: 1px solid var(--border); padding: var(--s8); }
    .bsys-card__label { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: var(--s6); display: block; }

    /* Applications */
    .sec--applications { padding: var(--s24) 0; background: var(--bg); }
    .apps-bento { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .apps-tile { position: relative; overflow: hidden; border: 1px solid var(--border); background: oklch(0.09 0.003 249); }
    .apps-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .apps-tile__cap {
      position: absolute; left: var(--s4); bottom: var(--s4);
      font-family: var(--font-m); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: white; background: oklch(0 0 0 / 0.45); padding: 5px 9px;
    }
    .at--lead { grid-column: span 12; aspect-ratio: 16/7; }
    .at--7    { grid-column: span 7;  aspect-ratio: 7/5; }
    .at--5    { grid-column: span 5;  aspect-ratio: 1/1; }
    .at--4    { grid-column: span 4;  aspect-ratio: 4/5; }
    .at--6    { grid-column: span 6;  aspect-ratio: 3/2; }
    @media (max-width: 900px) { .apps-bento { grid-template-columns: repeat(6, 1fr); } .at--lead,.at--7,.at--5,.at--4,.at--6 { grid-column: span 6; aspect-ratio: 16/10; } }

    /* Digital */
    .sec--digital { padding: var(--s24) 0; background: #f8f8f8; }
    .dig-bento { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; margin-bottom: var(--s6); }
    .dig-tile { position: relative; overflow: hidden; border: 1px solid oklch(1 0 0 / 0.08); background: oklch(0.10 0.003 249); display: flex; flex-direction: column; }
    .dig-tile > img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .dig-tile__cap { position: absolute; left: var(--s4); bottom: var(--s4); z-index: 3; font-family: var(--font-m); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: white; background: oklch(0 0 0 / 0.45); padding: 5px 9px; }
    .dig--lead { grid-column: span 12; aspect-ratio: 16/7; }
    .dig--p4   { grid-column: span 4;  aspect-ratio: 4/5; }
    .browser-chrome { flex-shrink: 0; height: 38px; background: oklch(0.14 0.003 249); border-bottom: 1px solid oklch(1 0 0 / 0.08); display: flex; align-items: center; gap: var(--s3); padding: 0 var(--s4); }
    .browser-chrome__dots { display: flex; gap: 6px; }
    .browser-chrome__dots span { width: 10px; height: 10px; border-radius: 50%; display: block; }
    .browser-chrome__dots span:nth-child(1) { background: #FF5F57; }
    .browser-chrome__dots span:nth-child(2) { background: #FEBC2E; }
    .browser-chrome__dots span:nth-child(3) { background: #28C840; }
    .browser-chrome__url { flex: 1; max-width: 360px; margin: 0 auto; background: oklch(0.18 0.003 249); height: 22px; display: flex; align-items: center; justify-content: center; font-family: var(--font-m); font-size: 10px; letter-spacing: 0.06em; color: oklch(1 0 0 / 0.6); }
    .dig--lead .dig-tile__media { flex: 1; overflow: hidden; }
    .dig--lead .dig-tile__media img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
    @media (max-width: 900px) { .dig-bento { grid-template-columns: repeat(6, 1fr); } .dig--lead { grid-column: span 6; } .dig--p4 { grid-column: span 3; } }

    /* Stats */
    .proj-stats { padding: var(--s24) 0; background: oklch(0.06 0.003 249); }
    .proj-stats__hdr { margin-bottom: var(--s16); }
    .proj-stats .slabel { color: var(--accent); }
    .proj-stats .slabel::before { background: var(--accent); }
    .proj-stats .sh { color: white; }
    .proj-stats .sh em { color: var(--accent); }
    .proj-stats__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    .proj-stat { padding: var(--s8); border-right: 1px solid oklch(1 0 0 / 0.08); }
    .proj-stat:last-child { border-right: none; }
    .proj-stat__n { font-size: clamp(44px, 6vw, 80px); font-weight: 800; letter-spacing: -0.055em; line-height: 1; color: white; margin-top: var(--s6); margin-bottom: var(--s3); }
    .proj-stat__unit { font-family: var(--font-m); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: oklch(1 0 0 / 0.7); margin-top: var(--s3); }
    @media (max-width: 700px) { .proj-stats__grid { grid-template-columns: repeat(2, 1fr); } }

    /* Quote */
    .proj-quote { padding: var(--s24) 0; background: var(--bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .proj-quote__inner { max-width: 900px; }
    .proj-quote__mark { font-size: 96px; line-height: 0.6; color: var(--accent); font-family: Georgia, serif; margin-bottom: var(--s8); display: block; }
    .proj-quote__text { font-size: clamp(22px, 3vw, 40px); font-weight: 700; letter-spacing: -0.04em; line-height: 1.2; color: var(--text); margin-bottom: var(--s8); }
    .proj-quote__byline { display: flex; align-items: center; gap: var(--s4); }
    .proj-quote__byline::before { content: ''; width: 28px; height: 1px; background: var(--accent); flex-shrink: 0; }
    .proj-quote__author { font-family: var(--font-m); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-2); }
    .proj-quote__author strong { color: var(--text); }

    /* Outcome */
    .proj-outcome { padding: var(--s24) 0; }
    .proj-outcome__inner { display: grid; grid-template-columns: 1fr 1.4fr; gap: clamp(var(--s16), 8vw, 160px); align-items: start; }
    .proj-outcome__h { font-size: clamp(28px, 3.2vw, 48px); font-weight: 700; letter-spacing: -0.042em; line-height: 1.0; margin-top: var(--s6); }
    .proj-outcome__h em { font-style: normal; color: var(--accent); }
    .proj-outcome__cards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s4); }
    .proj-outcome__card { padding: var(--s6); border: 1px solid var(--border); background: var(--surface); }
    .proj-outcome__card-n { font-size: clamp(32px, 3.2vw, 52px); font-weight: 800; letter-spacing: -0.05em; line-height: 1; color: var(--accent); margin-bottom: var(--s3); }
    .proj-outcome__card-title { font-size: clamp(14px, 1.2vw, 16px); font-weight: 600; letter-spacing: -0.02em; color: var(--text); margin-bottom: var(--s2); }
    .proj-outcome__card-sub { font-family: var(--font-m); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-3); }
    @media (max-width: 860px) { .proj-outcome__inner { grid-template-columns: 1fr; gap: var(--s8); } }

    /* Footer */
    .site-footer { padding: var(--s8) 0; background: var(--accent); margin-top: var(--s16); }
    .site-footer__in { display: flex; align-items: center; justify-content: space-between; gap: var(--s6); flex-wrap: wrap; }
    .site-footer__logo { font-weight: 800; font-size: 15px; letter-spacing: -0.04em; color: white; }
    .site-footer__copy { font-family: var(--font-m); font-size: 9.5px; color: white; letter-spacing: 0.08em; }
  </style>
</head>
<body>

  <div class="preview-bar">
    <div class="preview-bar__inner">
      <span class="preview-bar__badge">Draft Preview</span>
      <span class="preview-bar__title" id="preview-title">Loading…</span>
      <div class="preview-bar__actions">
        <a href="#" id="back-btn" class="preview-bar__btn">← Editor</a>
        <button id="publish-btn" class="preview-bar__btn preview-bar__btn--publish">Publish</button>
      </div>
    </div>
  </div>

  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      Loading preview…
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const params   = new URLSearchParams(location.search);
    const id       = params.get('id');
    const editorURL = id ? `project-editor.html?id=${id}` : 'projects.html';
    document.getElementById('back-btn').href = editorURL;

    function imgTile(url, cls, cap) {
      if (url) return `<div class="${cls}"><img src="${url}" alt="${cap}" loading="lazy"><span class="apps-tile__cap">${cap}</span></div>`;
      return `<div class="${cls}" style="border:1px dashed oklch(0 0 0/0.12);background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:oklch(0 0 0/0.18);">${cap}</div>`;
    }

    function digTile(url, cls, cap) {
      if (!url) return '';
      if (cls === 'dig-tile dig--lead') {
        return `<div class="${cls}">
          <div class="browser-chrome"><div class="browser-chrome__dots"><span></span><span></span><span></span></div><div class="browser-chrome__url">parallax.studio</div></div>
          <div class="dig-tile__media"><img src="${url}" alt="${cap}"></div>
          <span class="dig-tile__cap">${cap}</span>
        </div>`;
      }
      return `<div class="${cls}"><img src="${url}" alt="${cap}"><span class="dig-tile__cap">${cap}</span></div>`;
    }

    if (!id) {
      document.getElementById('app').innerHTML = `<div class="loading-screen">No project ID provided.</div>`;
    } else {
      (async () => {
        const { data: p, error } = await db.from('case_studies').select('*').eq('id', id).single();
        if (error || !p) {
          document.getElementById('app').innerHTML = `<div class="loading-screen">Project not found.</div>`;
          return;
        }

        document.title = `${p.client || p.title} — Preview`;
        document.getElementById('preview-title').textContent = `${p.client || ''} — ${p.title || 'Untitled'}`;

        const services  = Array.isArray(p.services) ? p.services.join(' · ') : (p.services || '—');
        const colours   = Array.isArray(p.brand_colours) ? p.brand_colours : [];
        const fonts     = Array.isArray(p.brand_fonts)   ? p.brand_fonts   : [];
        const stats     = [1,2,3,4,5].map(i => ({ value: p[`stat${i}_value`], label: p[`stat${i}_label`] })).filter(s => s.value);
        const outcomes  = [1,2,3,4].map(i => ({ title: p[`outcome${i}_title`], desc: p[`outcome${i}_description`] })).filter(o => o.title);

        // Colour swatches
        function renderColours() {
          if (!colours.length) return '<p style="font-family:var(--font-m);font-size:10px;color:var(--text-3);">No colours defined yet.</p>';
          return colours.flatMap(g => (g.swatches || []).map(s => `
            <div class="bsys-swatch-item">
              <div class="bsys-swatch-chip" style="background:${s.hex};"></div>
              <span class="bsys-swatch-name">${s.name || ''}</span>
              <span class="bsys-swatch-hex">${s.hex}</span>
            </div>`)).join('');
        }

        // Font rows
        function renderFonts() {
          if (!fonts.length) return '<p style="font-family:var(--font-m);font-size:10px;color:var(--text-3);">No fonts defined yet.</p>';
          return fonts.map(f => `
            <div class="bsys-font-row">
              <span class="bsys-font-role">${f.role || f.name || 'Font'}</span>
              <span class="bsys-font-sample">${f.name || 'Font Name'}</span>
            </div>`).join('');
        }

        // Applications bento
        function renderApplications() {
          const slots = [
            { key: 'img_app_signage',       cls: 'apps-tile at--lead', cap: 'Signage' },
            { key: 'img_app_stationery',     cls: 'apps-tile at--7',   cap: 'Stationery' },
            { key: 'img_app_packaging',      cls: 'apps-tile at--5',   cap: 'Packaging' },
            { key: 'img_app_letterhead',     cls: 'apps-tile at--4',   cap: 'Letterhead' },
            { key: 'img_app_apparel',        cls: 'apps-tile at--4',   cap: 'Apparel' },
            { key: 'img_app_brochure',       cls: 'apps-tile at--4',   cap: 'Brochure' },
            { key: 'img_app_livery',         cls: 'apps-tile at--6',   cap: 'Livery' },
            { key: 'img_app_environmental',  cls: 'apps-tile at--6',   cap: 'Environmental' },
          ];
          const filled = slots.filter(s => p[s.key]);
          if (!filled.length) return '<p style="font-family:var(--font-m);font-size:10px;color:var(--text-3);margin-top:16px;">No application images uploaded yet.</p>';
          return `<div class="apps-bento">${filled.map(s => imgTile(p[s.key], s.cls, s.cap)).join('')}</div>`;
        }

        // Digital bento
        function renderDigital() {
          const items = [];
          if (p.img_digital_desktop) items.push(digTile(p.img_digital_desktop, 'dig-tile dig--lead', 'Desktop'));
          ['img_digital_phone_01','img_digital_phone_02','img_digital_phone_03'].forEach((k,i) => {
            if (p[k]) items.push(digTile(p[k], 'dig-tile dig--p4', `Phone 0${i+1}`));
          });
          if (p.img_digital_laptop) items.push(digTile(p.img_digital_laptop, 'dig-tile dig--lead', 'Laptop'));
          if (!items.length) return '<p style="font-family:var(--font-m);font-size:10px;color:var(--text-3);margin-top:16px;">No digital images uploaded yet.</p>';
          return `<div class="dig-bento">${items.join('')}</div>`;
        }

        document.getElementById('app').innerHTML = `

          <nav class="preview-nav">
            <div class="w">
              <div class="preview-nav__inner">
                <a href="../index.html" class="preview-nav__logo">Parallax<span>.</span></a>
                <span class="preview-nav__note">Preview mode — not live</span>
              </div>
            </div>
          </nav>

          <!-- Hero -->
          <section class="proj-hero">
            ${p.img_hero ? `<img class="proj-hero__img" src="${p.img_hero}" alt="${p.title}">` : ''}
            <div class="proj-hero__scrim"></div>
            <div class="proj-hero__content">
              <div class="w">
                <p class="proj-hero__tag"><span class="proj-hero__client">${p.client || 'Client'}</span></p>
                <h1 class="proj-hero__h1">${p.title || 'Project Title'}</h1>
              </div>
            </div>
          </section>

          <!-- Meta band -->
          <div class="proj-meta">
            <div class="w">
              <div class="proj-meta__grid">
                <div class="proj-meta__item"><span class="proj-meta__label">Client</span><span class="proj-meta__val">${p.client || '—'}</span></div>
                <div class="proj-meta__item"><span class="proj-meta__label">Industry</span><span class="proj-meta__val">${p.industry || '—'}</span></div>
                <div class="proj-meta__item"><span class="proj-meta__label">Services</span><span class="proj-meta__val">${services || '—'}</span></div>
                <div class="proj-meta__item"><span class="proj-meta__label">Year</span><span class="proj-meta__val">${p.year || '—'}</span></div>
              </div>
            </div>
          </div>

          <!-- Overview -->
          ${p.overview ? `
          <section class="proj-overview">
            <div class="w">
              <div class="proj-overview__inner">
                <div>
                  <p class="slabel">Project Overview</p>
                  <h2 class="proj-overview__h">${p.overview_heading || 'Project Overview'}</h2>
                </div>
                <div class="proj-overview__body"><p>${p.overview}</p></div>
              </div>
            </div>
          </section>` : ''}

          <!-- Challenge -->
          ${p.challenge_heading || p.challenge_body ? `
          <section class="proj-challenge">
            <div class="w">
              <div class="proj-challenge__inner">
                <p class="slabel">The Challenge</p>
                ${p.challenge_heading ? `<p class="proj-challenge__pull">${p.challenge_heading}</p>` : ''}
                ${p.challenge_body ? `<p class="proj-challenge__body">${p.challenge_body}</p>` : ''}
              </div>
            </div>
          </section>` : ''}

          <!-- Identity -->
          ${p.show_brand_system !== false ? `
          <section class="sec--branding">
            <div class="w">
              <div class="sec__hdr">
                <p class="slabel">Identity</p>
                <h2 class="sh">${p.heading_identity || 'A mark built to endure.'}</h2>
              </div>
              <div class="brand-primary">
                ${p.img_identity_mark_01
                  ? `<img src="${p.img_identity_mark_01}" alt="Primary mark"><span class="brand-primary__caption">Primary Mark</span>`
                  : `<div class="brand-primary__empty">No logo marks uploaded yet</div>`}
              </div>
              <div class="brand-row">
                <div class="brand-construction">
                  ${p.img_identity_construction ? `<img src="${p.img_identity_construction}" alt="Construction"><span class="brand-construction__caption">Construction</span>` : `<div class="slot-empty">Construction</div>`}
                </div>
                <div class="brand-variant">
                  ${p.img_identity_variant_light ? `<img src="${p.img_identity_variant_light}" alt="Light"><span class="brand-variant__label">Light</span>` : `<div class="slot-empty">Light</div>`}
                </div>
                <div class="brand-variant brand-variant--dark">
                  ${p.img_identity_variant_dark ? `<img src="${p.img_identity_variant_dark}" alt="Dark"><span class="brand-variant__label">Reversed</span>` : `<div class="slot-empty" style="color:oklch(1 0 0/0.2);">Dark</div>`}
                </div>
                <div class="brand-variant brand-variant--accent">
                  ${p.img_identity_variant_accent ? `<img src="${p.img_identity_variant_accent}" alt="Accent"><span class="brand-variant__label">On Accent</span>` : `<div class="slot-empty" style="color:oklch(1 0 0/0.3);">Accent</div>`}
                </div>
              </div>
            </div>
          </section>` : ''}

          <!-- Brand System -->
          ${(p.show_brand_system !== false && (colours.length || fonts.length)) ? `
          <section class="sec--system">
            <div class="w">
              <div class="sec__hdr">
                <p class="slabel">Brand System</p>
                <h2 class="sh">${p.heading_brand_system || 'The mechanics behind the mark.'}</h2>
              </div>
              <div class="bsys-grid-2">
                ${colours.length ? `
                <div class="bsys-card">
                  <span class="bsys-card__label">Colour Palette</span>
                  <div class="bsys-palette">${renderColours()}</div>
                </div>` : ''}
                ${fonts.length ? `
                <div class="bsys-card">
                  <span class="bsys-card__label">Typography</span>
                  ${renderFonts()}
                </div>` : ''}
              </div>
            </div>
          </section>` : ''}

          <!-- Applications -->
          ${p.show_applications !== false ? `
          <section class="sec--applications">
            <div class="w">
              <div class="sec__hdr">
                <p class="slabel">Applications</p>
                <h2 class="sh">${p.heading_applications || 'The brand in the wild.'}</h2>
              </div>
              ${renderApplications()}
            </div>
          </section>` : ''}

          <!-- Digital -->
          ${p.show_digital !== false ? `
          <section class="sec--digital">
            <div class="w">
              <div class="sec__hdr">
                <p class="slabel">Digital</p>
                <h2 class="sh">${p.heading_digital || 'Shipped to every screen.'}</h2>
              </div>
              ${renderDigital()}
            </div>
          </section>` : ''}

          <!-- Stats -->
          ${stats.length ? `
          <section class="proj-stats">
            <div class="w">
              <div class="proj-stats__hdr">
                <p class="slabel">By the Numbers</p>
                <h2 class="sh">${p.heading_stats || 'The work, quantified.'}</h2>
              </div>
              <div class="proj-stats__grid">
                ${stats.map(s => `
                  <div class="proj-stat">
                    <p class="proj-stat__n">${s.value}</p>
                    <p class="proj-stat__unit">${s.label}</p>
                  </div>`).join('')}
              </div>
            </div>
          </section>` : ''}

          <!-- Quote -->
          ${p.quote_text ? `
          <section class="proj-quote">
            <div class="w">
              <div class="proj-quote__inner">
                <span class="proj-quote__mark">&ldquo;</span>
                <p class="proj-quote__text">${p.quote_text}</p>
                <div class="proj-quote__byline">
                  <span class="proj-quote__author"><strong>${p.quote_attribution_name || ''}</strong>${p.quote_attribution_role ? ' &mdash; ' + p.quote_attribution_role : ''}</span>
                </div>
              </div>
            </div>
          </section>` : ''}

          <!-- Outcomes -->
          ${outcomes.length ? `
          <section class="proj-outcome">
            <div class="w">
              <div class="proj-outcome__inner">
                <div>
                  <p class="slabel">Outcome</p>
                  <h2 class="proj-outcome__h">${p.heading_outcomes || 'What we delivered.'}</h2>
                </div>
                <div class="proj-outcome__cards">
                  ${outcomes.map(o => `
                    <div class="proj-outcome__card">
                      <p class="proj-outcome__card-n">${o.title}</p>
                      <p class="proj-outcome__card-sub">${o.desc}</p>
                    </div>`).join('')}
                </div>
              </div>
            </div>
          </section>` : ''}

          <footer class="site-footer">
            <div class="w">
              <div class="site-footer__in">
                <span class="site-footer__logo">Parallax.</span>
                <span class="site-footer__copy">&copy; 2026 Parallax Studio. All rights reserved.</span>
              </div>
            </div>
          </footer>
        `;
      })();
    }

    document.getElementById('publish-btn').addEventListener('click', async () => {
      if (!id) return;
      const btn = document.getElementById('publish-btn');
      btn.textContent = 'Publishing…'; btn.disabled = true;
      const { error } = await db.from('case_studies').update({ status: 'published' }).eq('id', id);
      if (error) {
        btn.textContent = 'Error';
        setTimeout(() => { btn.textContent = 'Publish'; btn.disabled = false; }, 2000);
      } else {
        btn.textContent = 'Published ✓';
        btn.style.background = 'oklch(0.5 0.15 145)';
        btn.style.borderColor = 'oklch(0.5 0.15 145)';
      }
    });
  </script>
</body>
</html>

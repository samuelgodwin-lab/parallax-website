<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles — Parallax Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <aside class="sidebar">
    <a href="index.html" class="sidebar__logo">Parallax<span>.</span> <span class="sidebar__badge">Admin</span></a>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">Content</div>
      <a href="index.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="articles.html" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
        Articles
      </a>
      <a href="projects.html">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
        Projects
      </a>
      <div class="sidebar__section-label">Site</div>
      <a href="../index.html" target="_blank">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        View Site
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="sb-email">—</strong>
        Parallax Studio
      </div>
      <button class="sidebar__signout" id="signout-btn">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar__crumb"><strong>Articles</strong></span>
    </header>

    <div class="content">
      <div class="page-header">
        <div class="page-header__text">
          <h1>Articles</h1>
          <p>Manage your blog posts and insights</p>
        </div>
        <a href="article-editor.html" class="btn btn--primary">+ New Article</a>
      </div>

      <div class="actions-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="published">Published</button>
          <button class="filter-tab" data-filter="draft">Draft</button>
        </div>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Tags</th>
              <th>Status</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="articles-tbody">
            <tr><td colspan="6" class="empty-state"><p>Loading…</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    let allArticles = [];
    let activeFilter = 'all';

    const fmt   = d => new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    const badge = s => `<span class="badge badge--${s}">${s}</span>`;

    function render() {
      const tbody = document.getElementById('articles-tbody');
      const list  = activeFilter === 'all' ? allArticles : allArticles.filter(a => a.status === activeFilter);

      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><p>No ${activeFilter === 'all' ? '' : activeFilter + ' '}articles yet.</p></td></tr>`;
        return;
      }

      tbody.innerHTML = list.map(a => `
        <tr>
          <td class="td-title"><a href="article-editor.html?id=${a.id}">${a.title || '(Untitled)'}</a></td>
          <td class="td-meta">${a.category || '—'}</td>
          <td class="td-meta">${a.tags ? a.tags.slice(0,2).join(', ') : '—'}</td>
          <td>${badge(a.status)}</td>
          <td class="td-meta">${fmt(a.created_at)}</td>
          <td class="td-actions">
            <a href="article-editor.html?id=${a.id}" class="btn btn--ghost btn--sm">Edit</a>
            <button class="btn btn--danger btn--sm" data-id="${a.id}">Delete</button>
          </td>
        </tr>`).join('');

      tbody.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this article? This cannot be undone.')) return;
          const { error } = await db.from('articles').delete().eq('id', btn.dataset.id);
          if (error) { showToast('Error deleting article'); return; }
          allArticles = allArticles.filter(a => a.id !== btn.dataset.id);
          render();
          showToast('Article deleted');
        });
      });
    }

    (async () => {
      const session = await requireAuth();
      document.getElementById('sb-email').textContent = session.user.email;

      document.getElementById('signout-btn').addEventListener('click', async () => {
        await db.auth.signOut();
        window.location.href = 'login.html';
      });

      const { data } = await db.from('articles').select('id,title,category,tags,status,created_at').order('created_at', { ascending: false });
      allArticles = data || [];
      render();

      document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter;
          document.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b === btn));
          render();
        });
      });
    })();
  </script>
</body>
</html>
